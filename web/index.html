<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>DATA RÉNO — pilotage</title>
<style>
  :root{--bg:#0f1115;--card:#181b22;--line:#262b36;--txt:#e7ebf0;--muted:#8b95a7;
        --accent:#2ecc71;--warn:#f4b740;--hot:#ff6b4a;--bar:#2f3848}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
       background:var(--bg);color:var(--txt);line-height:1.45}
  header{padding:1.6rem 1.2rem .6rem;max-width:1100px;margin:0 auto}
  h1{font-size:1.35rem;margin:0}
  .sub{color:var(--muted);font-size:.85rem;margin-top:.25rem}
  main{max-width:1100px;margin:0 auto;padding:0 1.2rem 3rem}
  .grid{display:grid;gap:1rem;grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1rem 1.1rem}
  .kpi .v{font-size:2rem;font-weight:700}
  .kpi .l{color:var(--muted);font-size:.8rem;text-transform:uppercase;letter-spacing:.04em}
  h2{font-size:.95rem;margin:1.8rem 0 .7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .row{display:flex;align-items:center;gap:.6rem;margin:.35rem 0}
  .row .name{flex:0 0 200px;font-size:.88rem}
  .row .barwrap{flex:1;background:var(--bar);border-radius:7px;height:18px;overflow:hidden}
  .row .bar{height:100%;background:var(--accent);border-radius:7px}
  .row .num{flex:0 0 64px;text-align:right;font-variant-numeric:tabular-nums;font-size:.85rem}
  .hot .bar{background:var(--hot)} .warn .bar{background:var(--warn)}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th,td{text-align:left;padding:.45rem .6rem;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
  .note{color:var(--muted);font-size:.8rem;margin-top:1.4rem;border-top:1px solid var(--line);padding-top:1rem}
  .err{background:#3a1d1d;border:1px solid #6b2b2b;color:#ffd2d2;padding:1rem;border-radius:12px}
  code{background:#0b0d11;padding:.1rem .35rem;border-radius:5px;font-size:.85em}
</style>
</head>
<body>
<header>
  <h1>DATA RÉNO — tableau de pilotage</h1>
  <div class="sub" id="meta">Chargement…</div>
</header>
<main id="app"></main>

<script>
const E = (t, c, h) => { const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };
const pct = (n,d) => d>0 ? Math.round(100*n/d) : 0;

function bars(rows, max, cls=""){ // rows: [{name,value,sub?}]
  const wrap = E('div');
  const m = max || Math.max(1, ...rows.map(r=>r.value));
  rows.forEach(r=>{
    const row = E('div','row '+(r.cls||cls));
    row.appendChild(E('div','name', r.name));
    const bw = E('div','barwrap'); const b = E('div','bar'); b.style.width = (100*r.value/m)+'%'; bw.appendChild(b);
    row.appendChild(bw);
    row.appendChild(E('div','num', r.sub!=null ? r.sub : r.value));
    wrap.appendChild(row);
  });
  return wrap;
}
function table(headers, rows){
  const t=E('table'); const thead=E('thead'); const tr=E('tr');
  headers.forEach(h=>tr.appendChild(E('th', h.n?'n':'', h.t!=null?h.t:h)));
  thead.appendChild(tr); t.appendChild(thead);
  const tb=E('tbody');
  rows.forEach(r=>{ const row=E('tr'); r.forEach((c,i)=>row.appendChild(E('td', headers[i]&&headers[i].n?'n':'', c))); tb.appendChild(row); });
  t.appendChild(tb); return t;
}
function card(title, node){ const c=E('div','card'); if(title)c.appendChild(E('div','l',title)); c.appendChild(node); return c; }
function section(title){ return E('h2', '', title); }

function render(d){
  document.getElementById('meta').textContent =
    `Instantané du ${new Date(d.generated_at).toLocaleString('fr-FR')} · agrégats sans données personnelles`;
  const app = document.getElementById('app'); app.innerHTML='';

  // KPIs
  const kpiGrid = E('div','grid');
  const k = d.kpis||{};
  const kpis = [
    ['Taux d’ouverture', (k['taux_ouverture_%']??0)+' %'],
    ['Taux de réponse', (k['taux_reponse_%']??0)+' %'],
    ['Taux de RDV', (k['taux_rdv_%']??0)+' %'],
    ['Leads chauds', d.hot_leads_count??0],
    ['À envoyer aujourd’hui', d.due_today??0],
    ['Suppressions', d.suppressions??0],
  ];
  kpis.forEach(([l,v])=>{ const c=E('div','card kpi'); c.appendChild(E('div','v', v)); c.appendChild(E('div','l', l)); kpiGrid.appendChild(c); });
  app.appendChild(kpiGrid);

  // Funnel
  const f = d.funnel||{};
  const flabels = {messages_programmes:'Programmés',messages_envoyes:'Envoyés',contacts_ouverts:'Ouverts',contacts_repondus:'Répondus',rdv:'RDV'};
  app.appendChild(section('Funnel'));
  app.appendChild(card(null, bars(Object.keys(flabels).map(key=>({name:flabels[key], value:f[key]||0})))));

  // Engagement tiers (highlight CLIQUEUR)
  app.appendChild(section('Paliers d’engagement (froid → chaud)'));
  app.appendChild(card(null, bars((d.engagement_tiers||[]).map(t=>({
    name:t.tier, value:t.count, cls: t.tier==='CLIQUEUR'?'hot':(t.tier==='PERDU'?'warn':'')
  })))));

  // A/B objet
  app.appendChild(section('A/B objet'));
  const ab = d.ab_subjects||[];
  if(ab.length){
    app.appendChild(card(null, table(
      [{t:'Objet'},{t:'Envoyés',n:1},{t:'Ouv. %',n:1},{t:'Rép. %',n:1}],
      ab.map(r=>[r.subject, r.sent, r.open_rate+' %', r.reply_rate+' %'])
    )));
  } else { app.appendChild(card(null, E('div','sub','Aucun envoi pour l’instant.'))); }

  // Segments + statuts
  const two = E('div','grid');
  two.appendChild(card('Contacts par segment', table([{t:'Segment'},{t:'Nb',n:1}], (d.segments||[]).map(s=>[s.segment, s.count]))));
  two.appendChild(card('Messages par statut', table([{t:'Statut'},{t:'Nb',n:1}], (d.message_status||[]).map(s=>[s.status, s.count]))));
  app.appendChild(section('Répartitions')); app.appendChild(two);

  app.appendChild(E('div','note',
    'Lecture seule, agrégats sans PII. Les actions (envoyer, valider une réponse, '+
    'leads chauds nominatifs) se font en local via la CLI : <code>python -m src.daily run --confirm --smtp</code>, '+
    '<code>python -m src.scoring report</code>. Données rafraîchies par <code>python -m src.webexport web/data.json</code>.'));
}

fetch('./data.json', {cache:'no-store'})
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e=>{
    document.getElementById('meta').textContent='';
    document.getElementById('app').innerHTML =
      '<div class="err"><b>Aucune donnée (data.json introuvable).</b><br>'+
      'Génère l’instantané puis redéploie :<br>'+
      '<code>python -m src.webexport web/data.json --db out/state.sqlite</code></div>';
  });
</script>
</body>
</html>
